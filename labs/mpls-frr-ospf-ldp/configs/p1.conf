frr version 8.4_git
frr defaults traditional
hostname p1
no ipv6 forwarding
!
interface eth1
 ip address 20.20.20.3/24
 mpls
exit
!
interface eth2
 ip address 30.30.30.3/24
 mpls
exit
!
interface lo0
 ip address 3.3.3.3/32
exit
!
router ospf
 ospf router-id 3.3.3.3
 network 3.3.3.3/32 area 0
 network 20.20.20.0/24 area 0
 network 30.30.30.0/24 area 0
exit
!
mpls ldp
 router-id 3.3.3.3
 !
 address-family ipv4
  discovery transport-address 3.3.3.3
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
  interface lo0
  exit
  !
 exit-address-family
 !
exit
!
