frr version 8.4_git
frr defaults traditional
hostname pe2
no ipv6 forwarding
!
interface eth1
 ip address 30.30.30.4/24
 mpls
exit
!
interface eth2
 ip address 40.40.40.4/24
 mpls
exit
!
interface lo0
 ip address 4.4.4.4/32
exit
!
router ospf
 ospf router-id 4.4.4.4
 network 4.4.4.4/32 area 0
 network 30.30.30.0/24 area 0
 network 40.40.40.0/24 area 0
exit
!
mpls ldp
 router-id 4.4.4.4
 !
 address-family ipv4
  discovery transport-address 4.4.4.4
  !
  interface eth1
  exit
  !
  interface lo0
  exit
  !
 exit-address-family
 !
exit
!
