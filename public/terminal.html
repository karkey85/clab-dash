<!DOCTYPE html>
<html>
<head>
    <title>Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1e1e1e; overflow: hidden; }
        #terminal-container { height: 100vh; width: 100vw; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const container = params.get('container');
        const type = params.get('type') || 'bash';

        const term = new Terminal({ cursorBlink: true, theme: { background: '#1e1e1e' }, fontSize: 14, fontFamily: 'monospace' });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        setTimeout(() => fitAddon.fit(), 100);

        const ws = new WebSocket(`${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}/?container=${container}&type=${type}`);

        ws.onopen = () => {
            term.write(`\r\n\x1b[32m[CONNECTED: ${container}]\x1b[0m\r\n`);
            ws.send(JSON.stringify({ resize: { cols: term.cols, rows: term.rows } }));
        };

        ws.onmessage = (e) => term.write(e.data);
        term.onData(data => ws.readyState === WebSocket.OPEN && ws.send(data));
        
        window.addEventListener('resize', () => {
            fitAddon.fit();
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ resize: { cols: term.cols, rows: term.rows } }));
            }
        });
    </script>
</body>
</html>
