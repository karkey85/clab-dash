<!DOCTYPE html>
<html>
<head>
    <title>Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <style>body { background: #000; margin: 0; padding: 10px; height: 100vh; overflow: hidden; }</style>
</head>
<body>
    <div id="terminal" style="height: 100%;"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const term = new Terminal({ theme: { background: '#000' }, cursorBlink: true, fontSize: 14 });
        term.open(document.getElementById('terminal'));
        const ws = new WebSocket(`ws://${window.location.host}?container=${urlParams.get('container')}&type=${urlParams.get('type')}`);
        ws.onmessage = (ev) => term.write(ev.data);
        term.onData(data => ws.send(data));
        window.onresize = () => term.focus();
    </script>
</body>
</html>
