<!DOCTYPE html>
<html>
<head>
  <title>Containerlab Designer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { background: #252526; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
    .main { display: flex; flex: 1; height: calc(100vh - 45px); }
    #canvas-area { flex: 0 0 75%; position: relative; background: #fff; border-right: 1px solid #ddd; }
    #sidebar { flex: 0 0 25%; background: #f8f9fa; padding: 15px; overflow-y: auto; }
    svg, #ghostwire-frame { width: 100%; height: 100%; border: none; }
    #ghostwire-frame { display: none; }
    
    #protocol-panel { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.95); padding: 12px; border-radius: 8px; border: 1px solid #ccc; z-index: 5; width: 240px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .proto-btn { padding: 6px 8px; margin: 2px; font-size: 10px; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .active-bgp { background: #28a745; color: white; }
    .active-ospf { background: #fd7e14; color: white; }
    .active-vxlan { background: #007acc; color: white; }

    #peer-list { margin-top: 10px; font-size: 11px; max-height: 200px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 8px; font-family: monospace; }
    .peer-entry { padding: 4px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .peer-up { color: #28a745; font-weight: bold; }
    .peer-down { color: #dc3545; font-weight: bold; }

    .card { background: white; border: 1px solid #e0e0e0; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
    .nav-btn { background: #007acc; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 11px; border-radius: 3px; margin: 2px; }
    .if-text { fill: #d63384; font-size: 10px; font-weight: bold; pointer-events: none; font-family: monospace; }
    .live-link { stroke-dasharray: 10,5; stroke-width: 6; stroke-opacity: 0.8; animation: dash 2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -15; } }
  </style>
</head>
<body>
<header>
  <div><strong>Containerlab Designer</strong></div>
  <div>
    <input type="file" id="yamlFile" style="font-size:11px;"/>
    <button class="nav-btn" onclick="uploadYaml()">Render Topology</button>
    <button id="view-toggle-btn" class="nav-btn" style="background:#6f42c1" onclick="toggleView()">Switch to Ghostwire</button>
  </div>
</header>
<div class="main">
  <div id="canvas-area">
    <div id="protocol-panel">
      <strong>Observability:</strong>
      <div style="display: flex; gap: 2px; margin-top: 5px;">
        <button id="btn-bgp" class="proto-btn" onclick="toggleProto('bgp')">BGP</button>
        <button id="btn-ospf" class="proto-btn" onclick="toggleProto('ospf')">OSPF</button>
        <button id="btn-vxlan" class="proto-btn" onclick="toggleProto('vxlan')">VXLAN</button>
      </div>
      <div id="peer-list"></div>
    </div>
    <svg id="topo"></svg>
    <iframe id="ghostwire-frame" src="http://localhost:5001"></iframe>
  </div>
  <div id="sidebar"><h4>Live Nodes</h4><div id="nodes-list"></div></div>
</div>
<script>
let simulation, graphData = { nodes: [], links: [] }, isGhostwire = false;
let livePeers = [], currentProto = null;

function toggleView() {
  isGhostwire = !isGhostwire;
  const btn = document.getElementById("view-toggle-btn");
  
  document.getElementById("topo").style.display = isGhostwire ? "none" : "block";
  document.getElementById("protocol-panel").style.display = isGhostwire ? "none" : "block";
  document.getElementById("ghostwire-frame").style.display = isGhostwire ? "block" : "none";
  
  // FIX: DYNAMIC BUTTON TEXT
  btn.innerText = isGhostwire ? "Switch to Designer" : "Switch to Ghostwire";
}

async function toggleProto(p) {
  const peerDiv = document.getElementById("peer-list");
  if (currentProto === p) {
    currentProto = null;
    document.getElementById(`btn-${p}`).classList.remove(`active-${p}`);
    livePeers = []; peerDiv.innerHTML = "";
  } else {
    if (currentProto) document.getElementById(`btn-${currentProto}`).classList.remove(`active-${currentProto}`);
    currentProto = p;
    document.getElementById(`btn-${p}`).classList.add(`active-${p}`);
    const resp = await fetch(`/protocol-status/${p}`);
    livePeers = await resp.json();
    peerDiv.innerHTML = livePeers.map(peer => `<div class="peer-entry"><span>${peer.node.split('-').pop()} ↔ ${peer.neighborIp}</span><span class="${peer.status === 'up' ? 'peer-up' : 'peer-down'}">${peer.status.toUpperCase()}</span></div>`).join('');
  }
  draw();
}

async function draw(){
  const canvas = document.getElementById("canvas-area");
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const resp = await fetch("/topology-graph");
  graphData = await resp.json();
  if(!graphData.nodes.length) return;

  const svg = d3.select("#topo");
  svg.selectAll("*").remove();
  const g = svg.append("g");
  svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

  simulation = d3.forceSimulation(graphData.nodes)
    .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(250))
    .force("charge", d3.forceManyBody().strength(-2000))
    .force("center", d3.forceCenter(w/2, h/2))
    .force("y", d3.forceY(d => d.type === "spine" ? h*0.2 : d.type === "leaf" ? h*0.5 : h*0.8).strength(3));

  const link = g.selectAll("line.base").data(graphData.links).enter().append("line").attr("stroke", "#bbb").attr("stroke-width", 2);

  // RESTORED INTERFACE LABELS (PINK)
  const sIfs = g.selectAll(".sif").data(graphData.links).enter().append("text").attr("class","if-text").text(d=>d.sourceIf);
  const tIfs = g.selectAll(".tif").data(graphData.links).enter().append("text").attr("class","if-text").text(d=>d.targetIf);

  if (currentProto && currentProto !== 'vxlan') {
    g.selectAll("line.live").data(graphData.links).enter().append("line").attr("class", "live-link")
      .attr("stroke", l => {
        const s = l.source.id || l.source; const t = l.target.id || l.target;
        const peer = livePeers.find(p => s.includes(p.node) || t.includes(p.node));
        if(!peer) return "transparent";
        return peer.status === 'up' ? (currentProto === 'bgp' ? '#28a745' : '#fd7e14') : '#dc3545';
      });
  }

  const node = g.selectAll(".n").data(graphData.nodes).enter().append("g")
    .call(d3.drag().on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }).on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; }).on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  node.append("circle").attr("r", 25).attr("fill", d => d.type === "spine" ? "#fd7e14" : d.type === "leaf" ? "#0dcaf0" : "#20c997").attr("stroke", "#fff").attr("stroke-width", 2);
  node.append("text").attr("text-anchor", "middle").attr("dy", 5).style("font-weight", "bold").style("fill", "#fff").style("font-size", "10px").text(d => d.label.split('-').pop());

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    g.selectAll(".live-link").attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    
    // POSITION INTERFACE LABELS
    sIfs.attr("x", d => d.source.x + (d.target.x - d.source.x) * 0.2).attr("y", d => d.source.y + (d.target.y - d.source.y) * 0.2);
    tIfs.attr("x", d => d.target.x + (d.source.x - d.target.x) * 0.2).attr("y", d => d.target.y + (d.source.y - d.target.y) * 0.2);
    
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

async function uploadYaml(){
  const f = document.getElementById("yamlFile").files[0]; if(!f) return;
  await fetch("/upload-yaml", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({yaml: await f.text()}) });
  draw();
}

async function renderSidebar(data) {
  const div = document.getElementById("nodes-list"); div.innerHTML = "";
  for(const n of data){
    const caps = await (await fetch(`/container-capabilities/${n.name}`)).json();
    const el = document.createElement("div"); el.className = "card";
    el.innerHTML = `<strong>${n.name}</strong><br/>
      <button class="nav-btn" onclick="window.open('/terminal.html?container=${n.name}&type=${caps.shell}')">TERM</button>
      ${caps.vtysh ? `<button class="nav-btn" style="background:#444" onclick="window.open('/terminal.html?container=${n.name}&type=vtysh')">VTYSH</button>` : ''}`;
    div.appendChild(el);
  }
}

async function init(){
  const containers = await (await fetch("/containers")).json();
  renderSidebar(containers);
  setTimeout(async () => { if((await (await fetch("/has-topology")).json()).loaded) draw(); }, 1000);
}
window.onload = init;
</script>
</body>
</html>
